name: deploy

on:
  push:
    branches: [prod]
  workflow_dispatch:

# Never let two deploys of the same branch overlap on the runner.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, hdr-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Write .env from variables
        run: |
          umask 177
          cat > .env <<EOF
          ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}
          EOF

      - name: Build & (re)start container
        run: docker compose up -d --build --force-recreate

      - name: Prune dangling images
        run: docker image prune -f
